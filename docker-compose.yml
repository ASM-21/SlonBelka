services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: slonbelka
      POSTGRES_PASSWORD: slonbelka
      POSTGRES_DB: slonbelka
    ports:
      - "5432:5432"
    volumes:
      - slonbelka_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slonbelka"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://slonbelka:slonbelka@db:5432/slonbelka
      JWT_SECRET: dev-secret-change-me
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  slonbelka_pgdata:

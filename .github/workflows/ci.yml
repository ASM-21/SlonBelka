name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Backend tests
        working-directory: backend
        run: |
          rm -f *.db
          python -m pytest -q
      - name: Pipeline tests
        working-directory: pipeline
        run: |
          if [ -d tests ]; then python -m pytest -q; else echo "no pipeline tests yet"; fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Tests
        working-directory: frontend
        run: npx vitest run

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Apply the full migration chain to a fresh database
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./_ci.db
        run: |
          rm -f _ci.db
          alembic upgrade head

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Build the frontend against the local backend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: |
          npm ci
          npm run build
      - name: Seed the backend database
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./e2e.db
        run: |
          rm -f e2e.db
          python -m app.seed_dev
      - name: Run the browser smoke test
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium
          npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: e2e/test-results/
